<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מערכת ניהול מסמכים - אמא היקרה</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Assistant', sans-serif; background-color: #f3f4f6; }
        @media print {
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            body { background-color: white; }
            .document-card { shadow: none !important; border: none !important; margin: 0 !important; width: 100% !important; }
        }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-4xl mx-auto mb-8 no-print flex justify-center gap-4">
        <button onclick="showPage('deal')" id="btn-deal" class="px-6 py-2 bg-blue-600 text-white rounded-full shadow-lg hover:bg-blue-700 transition">חשבון עסקה</button>
        <button onclick="showPage('receipt')" id="btn-receipt" class="px-6 py-2 bg-gray-200 text-gray-700 rounded-full shadow-lg hover:bg-gray-300 transition">חשבונית מס / קבלה</button>
    </div>

    <button onclick="window.print()" class="no-print fixed bottom-8 left-8 bg-green-500 text-white p-4 rounded-full shadow-2xl hover:scale-110 transition-transform z-50">
        🖨️ הדפס מסמך
    </button>

    <div class="max-w-4xl mx-auto bg-white p-8 shadow-2xl rounded-lg border border-gray-100 document-card">
        
        <div class="flex justify-between items-start border-b-2 border-blue-500 pb-6 mb-8">
            <div>
                <input type="text" placeholder="שם העסק של אמא" class="text-3xl font-bold text-blue-800 block outline-none border-b border-transparent focus:border-gray-300 w-full">
                <input type="text" placeholder="עוסק מורשה / פטור: 12345678" class="text-sm text-gray-500 mt-2 block w-full outline-none">
                <input type="text" placeholder="כתובת וטלפון" class="text-sm text-gray-500 block w-full outline-none">
            </div>
            <div class="text-left">
                <h1 id="doc-title" class="text-2xl font-bold text-gray-800 uppercase tracking-wide">חשבון עסקה</h1>
                <p class="text-gray-400 mt-1">תאריך: <input type="date" class="outline-none border-none"></p>
                <p class="text-gray-400">מספר מסמך: <input type="text" placeholder="001" class="w-12 outline-none border-none"></p>
            </div>
        </div>

        <div class="mb-10">
            <h3 class="text-gray-600 font-bold mb-2">לכבוד:</h3>
            <input type="text" placeholder="שם הלקוח / חברה" class="text-lg font-semibold block w-full outline-none border-b border-gray-100 focus:border-blue-300">
            <input type="text" placeholder="כתובת הלקוח" class="text-sm text-gray-500 block w-full outline-none">
        </div>

        <table class="w-full text-right mb-10 border-collapse">
            <thead>
                <tr class="bg-gray-50 text-gray-700 uppercase text-sm">
                    <th class="py-3 px-4 border-b">תיאור השירות</th>
                    <th class="py-3 px-4 border-b">שעות</th>
                    <th class="py-3 px-4 border-b">תעריף</th>
                    <th class="py-3 px-4 border-b">סה"כ</th>
                </tr>
            </thead>
            <tbody id="invoice-rows">
                <tr>
                    <td class="py-4 px-4 border-b"><input type="text" value="ייעוץ / עבודה מקצועית" class="w-full outline-none"></td>
                    <td class="py-4 px-4 border-b"><input type="number" id="hours" value="1" oninput="calculate()" class="w-16 outline-none"></td>
                    <td class="py-4 px-4 border-b"><input type="number" id="rate" value="0" oninput="calculate()" class="w-20 outline-none"> ₪</td>
                    <td class="py-4 px-4 border-b font-bold"><span id="row-total">0</span> ₪</td>
                </tr>
            </tbody>
        </table>

        <div class="flex justify-end">
            <div class="w-64">
                <div class="flex justify-between py-2 border-b">
                    <span>סה"כ לפני מע"מ:</span>
                    <span id="subtotal">0 ₪</span>
                </div>
                <div id="vat-row" class="flex justify-between py-2 border-b">
                    <span>מע"מ (17%):</span>
                    <span id="vat">0 ₪</span>
                </div>
                <div class="flex justify-between py-3 text-xl font-bold text-blue-700">
                    <span>סה"כ לתשלום:</span>
                    <span id="grand-total">0 ₪</span>
                </div>
            </div>
        </div>

        <div class="mt-16 pt-8 border-t border-gray-100">
            <h4 class="font-bold text-gray-700 mb-2">פרטים להעברה בנקאית:</h4>
            <div class="grid grid-cols-2 gap-4 text-sm text-gray-600">
                <p>בנק: <input type="text" placeholder="שם הבנק" class="outline-none"></p>
                <p>סניף: <input type="text" placeholder="000" class="outline-none"></p>
                <p>מספר חשבון: <input type="text" placeholder="00000000" class="outline-none"></p>
                <p>על שם: <input type="text" placeholder="שם בעלת החשבון" class="outline-none"></p>
            </div>
            <p class="mt-6 text-xs text-gray-400">המסמך הופק באמצעות מערכת ניהול פנימית.</p>
        </div>
    </div>

    <script>
        function calculate() {
            const hours = document.getElementById('hours').value || 0;
            const rate = document.getElementById('rate').value || 0;
            const subtotal = hours * rate;
            const vat = subtotal * 0.17;
            const total = subtotal + vat;

            document.getElementById('row-total').innerText = subtotal.toLocaleString();
            document.getElementById('subtotal').innerText = subtotal.toLocaleString() + ' ₪';
            document.getElementById('vat').innerText = vat.toLocaleString() + ' ₪';
            document.getElementById('grand-total').innerText = total.toLocaleString() + ' ₪';
        }

        function showPage(type) {
            const title = document.getElementById('doc-title');
            const btnDeal = document.getElementById('btn-deal');
            const btnReceipt = document.getElementById('btn-receipt');
            const vatRow = document.getElementById('vat-row');

            if (type === 'deal') {
                title.innerText = 'חשבון עסקה';
                btnDeal.className = 'px-6 py-2 bg-blue-600 text-white rounded-full shadow-lg';
                btnReceipt.className = 'px-6 py-2 bg-gray-200 text-gray-700 rounded-full shadow-lg';
            } else {
                title.innerText = 'חשבונית מס / קבלה';
                btnReceipt.className = 'px-6 py-2 bg-green-600 text-white rounded-full shadow-lg';
                btnDeal.className = 'px-6 py-2 bg-gray-200 text-gray-700 rounded-full shadow-lg';
            }
        }
    </script>
</body>
</html>
